name: Deploy Connector to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'connector/**'
  workflow_dispatch:

env:
  REGISTRY:       clarivise5cr.azurecr.io
  ACR_NAME:       clarivise5cr
  IMAGE_NAME:     clarivise-shield-connector
  RESOURCE_GROUP: Clarivise5
  CONTAINER_APP:  clarivise5
  SUBSCRIPTION:   8f6344c7-58ae-450d-8f77-cc3492a08c0c

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR (no local Docker needed)
        run: |
          az acr build --registry ${{ env.ACR_NAME }} --image ${{ env.IMAGE_NAME }}:${{ github.sha }} --image ${{ env.IMAGE_NAME }}:latest ./connector

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update --name ${{ env.CONTAINER_APP }} --resource-group ${{ env.RESOURCE_GROUP }} --subscription ${{ env.SUBSCRIPTION }} --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}